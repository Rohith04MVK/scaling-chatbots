services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: chatlog
      POSTGRES_USER: chatlog
      POSTGRES_PASSWORD: chatlog
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatlog -d chatlog"]
      interval: 3s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    # Dev-only: no AOF/RDB. Production should enable and tune persistence.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
    ports:
      - "6379:6379"

  api:
    build: .
    environment:
      CHATLOG_DATABASE_URL: postgresql+asyncpg://chatlog:chatlog@db:5432/chatlog
      CHATLOG_REDIS_URL: redis://redis:6379/0
      CHATLOG_CORS_ORIGINS: http://localhost:3000
      CHATLOG_GROQ_API_KEY: ${CHATLOG_GROQ_API_KEY:-}
    volumes:
      # Keep API code in sync with the host (frontend already does this).
      - ./backend:/app/backend
      - ./sdk:/app/sdk
      - ./shared:/app/shared
    command:
      - /bin/sh
      - -c
      - uv run alembic upgrade head && uv run uvicorn chatlog.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  consumer:
    build: .
    environment:
      CHATLOG_DATABASE_URL: postgresql+asyncpg://chatlog:chatlog@db:5432/chatlog
      CHATLOG_REDIS_URL: redis://redis:6379/0
      CHATLOG_REDIS_CONSUMER_NAME: consumer-1
    volumes:
      - ./backend:/app/backend
      - ./sdk:/app/sdk
      - ./shared:/app/shared
    command: ["uv", "run", "python", "backend/consumer.py"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: dev
    environment:
      # Browser calls the API on the host, not the Docker network name.
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres_data:
